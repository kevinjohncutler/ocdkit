      <div id="sidebar" class="side-panel side-panel--right">
        <!--
          The segmentation panel is injected at runtime by js/plugin-panel.js
          based on the active plugin's manifest. If no plugin is registered,
          no panel is created — the container itself is absent from the DOM.
          See _attic_omnipose-panel.html for the legacy hard-coded omnipose UI
          (kept as reference for porting omnipose to its own plugin).
        -->
        <div class="panel-section" id="systemInfoPanel">
          <div class="control-heading">Server Info</div>
          <div class="control system-info">
            <div class="system-row">
              <span class="system-label">RAM</span>
              <span id="systemRam" class="system-value">--</span>
            </div>
            <div class="system-row">
              <span class="system-label">CPU</span>
              <span id="systemCpu" class="system-value">--</span>
            </div>
            <div class="system-row">
              <span class="system-label" id="systemGpuLabel">
                GPU
                <span id="systemGpuMark" class="system-status-mark" aria-hidden="true"></span>
              </span>
              <span id="systemGpu" class="system-value">--</span>
            </div>
          </div>
        </div>
        <div class="hint">
          Use B/G/I to switch tools, [ ] to resize brush, digits 0-9 set label. Hold Space to pan, scroll to zoom, W/S to traverse directory.
        </div>
      </div>
